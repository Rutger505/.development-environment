# XDG Standards
export XDG_CONFIG_HOME="$HOME/.config"
export XDG_CACHE_HOME="$HOME/.cache"
export XDG_DATA_HOME="$HOME/.local/share"
export XDG_STATE_HOME="$HOME/.local/state"

# Dev-env location (can be overridden before sourcing)
export DEV_ENV="${DEV_ENV:-$XDG_DATA_HOME/dev-env}"

# Application specific environment variables
ZDOTDIR="$XDG_CONFIG_HOME/zsh"
ZSH_CONFIG_DIR="$XDG_CONFIG_HOME/zsh"
ZSH="$XDG_DATA_HOME/oh-my-zsh"
HISTFILE="$XDG_STATE_HOME/zsh/history"
HISTSIZE=100000
SAVEHIST=100000

NPM_CONFIG_USERCONFIG="$XDG_CONFIG_HOME"/npm/npmrc
DOCKER_CONFIG="$XDG_CONFIG_HOME"/docker
XCOMPOSEFILE="$XDG_CONFIG_HOME"/X11/xcompose

NVM_DIR="$XDG_DATA_HOME"/nvm
CARGO_HOME="$XDG_DATA_HOME/cargo"
PNPM_HOME="$XDG_DATA_HOME/pnpm"
BUN_INSTALL="$XDG_DATA_HOME/.bun"
W3M_DIR="$XDG_DATA_HOME/w3m"
GRADLE_USER_HOME="$XDG_DATA_HOME"/gradle
DOTNET_CLI_HOME="$XDG_DATA_HOME"/dotnet
ANDROID_USER_HOME="$XDG_DATA_HOME"/android
PLATFORMIO_CORE_DIR="$XDG_DATA_HOME"/platformio
GNUPGHOME="$XDG_DATA_HOME"/gnupg
OMNISHARPHOME="$XDG_CONFIG_HOME"/omnisharp
VCPKG_ROOT="$XDG_DATA_HOME/vcpkg"
RUSTUP_HOME=~/.local/share/rustup

FONTCONFIG_PATH="/etc/fonts/"
FONTCONFIG_FILE="/etc/fonts/fonts.conf"

EDITOR="nvim"
VISUAL="nvim"
PAGER="less"

PATH="$PATH:$HOME/.local/bin"
PATH="$PATH:$DEV_ENV/scripts"
PATH="$XDG_DATA_HOME/JetBrains/Toolbox/scripts:$PATH"
PATH="$PNPM_HOME:$PATH"
PATH="$BUN_INSTALL/bin:$PATH"
PATH="$XDG_DATA_HOME/opencode/bin:$PATH"
PATH="/usr/libexec/imv:$PATH"
PATH="$CARGO_HOME/bin:$PATH"

DEV_ENV_ERROR_FILE="$XDG_STATE_HOME/dev-env-sync-error"

